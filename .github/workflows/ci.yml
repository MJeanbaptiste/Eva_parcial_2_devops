name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t tienda-backend:${{ github.sha }} ./tienda-tech-backend

      - name: Build frontend image
        run: docker build -t tienda-frontend:${{ github.sha }} ./tienda-tech-frontend

      - name: Build database image
        run: docker build -t tienda-db:${{ github.sha }} ./tienda-tech-db

      - name: Verify images
        run: docker images | grep tienda

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./tienda-tech-backend
        run: npm install

      - name: Run unit tests
        working-directory: ./tienda-tech-backend
        run: npm test

  deploy:
    name: Deploy (Docker Compose)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Deploy with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Verify deployment
        run: |
          docker compose ps
          echo "--- Backend health check ---"
          curl -f http://localhost:3001/api/health || exit 1
          echo ""
          echo "--- Frontend check ---"
          curl -f http://localhost:8080 || exit 1
          echo ""
          echo "Deployment verified successfully"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
