name: Snyk Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snyk-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./tienda-tech-backend
        run: npm install

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=tienda-tech-backend/package.json

      - name: Block deployment on vulnerability
        if: failure()
        run: |
          echo "SECURITY ALERT: Snyk found vulnerabilities"
          echo "Deployment is BLOCKED until vulnerabilities are resolved"
          exit 1
